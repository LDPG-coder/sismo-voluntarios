# ============================================================
# Sismo Voluntarios — CI (pytest + build web)
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sismo_test
          POSTGRES_USER: sismo
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sismo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      SISMO_DB_HOST: localhost
      SISMO_DB_PORT: "5432"
      SISMO_DB_NAME: sismo_test
      SISMO_DB_USER: sismo
      SISMO_DB_PASSWORD: testpassword
      SISMO_SESSION_SECRET: ci-test-secret-for-github-actions-only-32chars!!
      SISMO_GOOGLE_CLIENT_ID: ci-test
      SISMO_GOOGLE_CLIENT_SECRET: ci-test
      SISMO_GOOGLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/callback
      SISMO_OPENAI_API_KEY: ci-test
      SISMO_OPENAI_MODEL: north-mini-code-free
      SISMO_RATE_LIMIT_TRUST_PROXY: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt pytest pytest-asyncio httpx

      - name: Run migrations
        run: cd apps/api && alembic upgrade head
        env:
          DATABASE_URL: postgresql://sismo:testpassword@localhost:5432/sismo_test

      - name: Run tests
        run: cd apps/api && python -m pytest tests/ -v --tb=short -x

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Type check
        run: npm run typecheck
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.sismo.lat
          NEXT_PUBLIC_WEB_ORIGIN: https://sismo.lat
