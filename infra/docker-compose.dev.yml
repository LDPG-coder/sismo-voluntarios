# ============================================================
# Sismo Voluntarios — Development
# ============================================================
# Optimizado para velocidad de build y pruebas en dev.
# Puertos y servicios parametrizados (ver .env / export de vars).
#
# Arranque rápido:
#   ./dev.sh up          # api + web + postgres + redis
#   ./dev.sh up-test     # igual + servicio de tests listo
#   ./dev.sh test-api    # corre pytest dentro del container api
#
# Para desactivar un servicio opcional usa perfiles:
#   docker compose -f docker-compose.dev.yml --profile cache down
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SISMO_DB_NAME:-sismo}
      POSTGRES_USER: ${SISMO_DB_USER:-sismo}
      POSTGRES_PASSWORD: ${SISMO_DB_PASSWORD:-sismo}
    ports:
      - "127.0.0.1:${SISMO_PG_PORT:-5432}:5432"
    volumes:
      - sismo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SISMO_DB_USER:-sismo}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sismo-dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sismo-dev
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    environment:
      SISMO_DB_HOST: postgres
      SISMO_DB_PORT: "5432"
      SISMO_REDIS_URL: redis://redis:6379/0
      SISMO_API_PORT: ${SISMO_API_PORT:-8000}
      SISMO_API_CORS_ORIGINS: http://localhost:${SISMO_WEB_PORT:-3001}
      SISMO_WEB_ORIGIN: http://localhost:${SISMO_WEB_PORT:-3001}
    ports:
      - "127.0.0.1:${SISMO_API_PORT:-8000}:${SISMO_API_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # :cached acelera montajes en macOS/Windows (no-op en Linux)
    volumes:
      - ../apps/api:/app:cached
    networks:
      - sismo-dev

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${SISMO_API_PORT:-8000}
      NEXT_PUBLIC_WEB_ORIGIN: http://localhost:${SISMO_WEB_PORT:-3001}
      SISMO_WEB_PORT: ${SISMO_WEB_PORT:-3001}
    command: npx next dev --port ${SISMO_WEB_PORT:-3001}
    ports:
      - "127.0.0.1:${SISMO_WEB_PORT:-3001}:${SISMO_WEB_PORT:-3001}"
    depends_on:
      - api
    volumes:
      - ../apps/web:/app:cached
      - /app/node_modules
    networks:
      - sismo-dev

  # Servicio efímero para correr la suite de tests sin rebuild.
  # Usar: docker compose -f docker-compose.dev.yml run --rm test-api
  test-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    profiles: ["test"]
    env_file:
      - ../apps/api/.env
    environment:
      SISMO_DB_HOST: postgres
      SISMO_DB_PORT: "5432"
      SISMO_REDIS_URL: redis://redis:6379/0
      SISMO_API_PORT: ${SISMO_API_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app:cached
    networks:
      - sismo-dev
    command: ["sh", "-c", "python -m pytest tests/ -q"]

volumes:
  sismo_pgdata:
    name: sismo_pgdata_dev

networks:
  sismo-dev:
    name: sismo-dev
    driver: bridge
