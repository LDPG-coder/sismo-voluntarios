# ============================================================
# Public production web — separate from the video (dev) web.
# Usa el build de producción de docker-compose.yml pero en la
# red "sismo" (donde está cloudflared) y como proyecto aparte
# (sismo-public) para no pisar el container de video (infra-web-1).
# No publica puerto en el host: cloudflared lo alcanza por la red
# docker como http://web:3000.
# ============================================================

services:
  # El web público reusa el api/postgres/redis YA existentes (infra-*) en la
  # red sismo, así que desactivamos estos servicios en este proyecto para no
  # crear duplicados ni ocupar puertos.
  api:
    profiles: ["nostart"]
  postgres:
    profiles: ["nostart"]
  redis:
    profiles: ["nostart"]
  cloudflared:
    profiles: ["nostart"]
    depends_on: []

  web:
    # Hereda build + args de docker-compose.yml (NEXT_PUBLIC_* desde --env-file).
    container_name: sismo-public-web-1
    depends_on: []
    ports: []
    networks:
      - sismo
    environment:
      # El web público debe apuntar a la API vía el hostname "api" en la red sismo.
      INTERNAL_API_URL: http://api:8000

networks:
  sismo:
    external: true
    name: sismo
