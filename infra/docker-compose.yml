# ============================================================
# Sismo Voluntarios — Production (base)
# ============================================================
# Este archivo define SOLO api + web + cloudflared (tunnel).
# NO incluye postgres ni redis: así puedes apuntar a servicios
# externos vía SISMO_DB_HOST / SISMO_REDIS_URL y levantar este
# stack solo con:
#     docker compose -f docker-compose.yml up -d
#
# Para el stack local completo (postgres + redis incluidos y con
# healthchecks), usa el override que se carga automáticamente:
#     docker compose up -d          # = docker-compose.yml + override
#
# Config: todo viene de infra/.env (única fuente). Los 4 secretos
# críticos NO se pasan como env, sino como Docker secrets (archivos
# en /run/secrets). Generarlos con: ./setup-secrets.sh
#
# La red se llama "sismo" (estable) para que otros stacks se
# conecten por nombre de servicio (ver docker-compose.network.yml).
# ============================================================

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SISMO_ENV: ${SISMO_ENV:-production}
      SISMO_DEBUG: ${SISMO_DEBUG:-false}
      SISMO_API_HOST: ${SISMO_API_HOST:-0.0.0.0}
      SISMO_API_PORT: ${SISMO_API_PORT:-8000}
      SISMO_API_CORS_ORIGINS: ${SISMO_API_CORS_ORIGINS:-https://sismo.lat}
      SISMO_WEB_ORIGIN: ${SISMO_WEB_ORIGIN:-https://sismo.lat}
      SISMO_DB_HOST: ${SISMO_DB_HOST:-postgres}
      SISMO_DB_PORT: ${SISMO_DB_PORT:-5432}
      SISMO_DB_NAME: ${SISMO_DB_NAME:-sismo}
      SISMO_DB_USER: ${SISMO_DB_USER:-sismo}
      SISMO_REDIS_URL: ${SISMO_REDIS_URL:-redis://redis:6379/0}
      SISMO_GOOGLE_CLIENT_ID: ${SISMO_GOOGLE_CLIENT_ID:-}
      SISMO_GOOGLE_REDIRECT_URI: ${SISMO_GOOGLE_REDIRECT_URI:-https://api.sismo.lat/api/v1/auth/callback}
      SISMO_OPENAI_API_KEY: ${SISMO_OPENAI_API_KEY:-}
      SISMO_OPENAI_MODEL: ${SISMO_OPENAI_MODEL:-north-mini-code-free}
      SISMO_IMPORTER_TOKEN: ${SISMO_IMPORTER_TOKEN:-}
      # SEP integration (same-origin subpage model). SISMO_SEP_API_TOKEN is the
      # Bearer for the Partner API + legacy one-time login; SISMO_SEP_PROXY_SECRET
      # is shared ONLY with SEP's reverse proxy to verify the injected identity
      # header. Both left empty until SEP provides its proxy/token setup.
      SISMO_SEP_API_TOKEN: ${SISMO_SEP_API_TOKEN:-}
      SISMO_SEP_PROXY_SECRET: ${SISMO_SEP_PROXY_SECRET:-}
      SISMO_LOG_LEVEL: ${SISMO_LOG_LEVEL:-INFO}
      SISMO_LOG_FORMAT: ${SISMO_LOG_FORMAT:-json}
    # Los 3 secretos que la API necesita se inyectan vía /run/secrets
    # (ver docker-entrypoint.sh) y NO aparecen en `docker inspect`.
    secrets:
      - SISMO_DB_PASSWORD
      - SISMO_SESSION_SECRET
      - SISMO_GOOGLE_CLIENT_SECRET
    ports:
      - "127.0.0.1:${SISMO_API_PORT:-8000}:${SISMO_API_PORT:-8000}"
    networks:
      - sismo
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
        NEXT_PUBLIC_WEB_ORIGIN: ${NEXT_PUBLIC_WEB_ORIGIN:-https://sismo.lat}
        SISMO_WEB_PORT: ${SISMO_WEB_PORT:-3000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WEB_ORIGIN: ${NEXT_PUBLIC_WEB_ORIGIN:-https://sismo.lat}
      SISMO_WEB_PORT: ${SISMO_WEB_PORT:-3000}
      # Orígenes SEP autorizados a embeber Sismo en un <iframe> (CSP frame-ancestors).
      # Vacío => solo mismo origen. Cuando SEP esté listo, agrega su origen separado por comas.
      SISMO_FRAME_ANCESTORS: ${SISMO_FRAME_ANCESTORS:-}
      INTERNAL_API_URL: http://api:${SISMO_API_PORT:-8000}
    # SISMO_SESSION_SECRET se inyecta vía secret (no como env plano)
    secrets:
      - SISMO_SESSION_SECRET
    ports:
      - "127.0.0.1:${SISMO_WEB_PORT:-3000}:${SISMO_WEB_PORT:-3000}"
    depends_on:
      - api
    networks:
      - sismo
    deploy:
      resources:
        limits:
          memory: 1G

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # NOTA: la imagen de cloudflared no trae shell, así que no puede
    # usarse un shim para leer el token desde /run/secrets. El token
    # se pasa como env (igual que antes). En un host de un solo tenant
    # esto es aceptable; si se requiere ocultarlo de `inspect`, hay que
    # buildizar una imagen custom con shell + entrypoint.
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      - api
      - web
    networks:
      - sismo
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  sismo:
    name: sismo
    driver: bridge

secrets:
  # El nombre del secreto = nombre del archivo montado en /run/secrets,
  # y el shim lo exporta como variable de entorno con ese mismo nombre.
  # Los archivos en host son 0644 (setup-secrets.sh) para que el usuario
  # no-root del container pueda leerlos vía bind mount.
  SISMO_DB_PASSWORD:
    file: ./secrets/sismo_db_password
  SISMO_SESSION_SECRET:
    file: ./secrets/sismo_session_secret
  SISMO_GOOGLE_CLIENT_SECRET:
    file: ./secrets/sismo_google_client_secret
